# autokernels-genesis harness configuration.
#
# Every project-specific or platform-specific value lives here. The Python
# harness (bench.py, prepare.py, orchestrate.py, watchdog.py) reads this file
# at import time. Defaults in code match the Genesis-on-MI300X case below;
# editing this file alone should be sufficient to point the loop at a
# different ROCm project, GPU, or benchmark.
#
# To target a different project: copy this file to a new repo and edit.
# Per-campaign details (which files an agent may edit, the kernel regex,
# the baseline metrics) live in kernels/<campaign>/target.json -- not here.

# ---------------------------------------------------------------------------
# Reference / metric
# ---------------------------------------------------------------------------
[reference]
# What the loop is optimizing.
metric_name      = "e2e_throughput"      # contract key the agent reads
metric_unit      = "env*steps/s"
higher_is_better = true                  # false for latency-style metrics
# The "north star" we measure against. % of reference is the headline number.
reference_label  = "H100"
reference_value  = 794280.0

# ---------------------------------------------------------------------------
# Benchmark
# ---------------------------------------------------------------------------
[bench]
# Script that runs inside the container. Must accept --n-envs / --num-steps /
# --precision / --out / --tag and write a JSON {throughput, wall_time_s, ...}.
script              = "/work/bench_mi300.py"
default_e2e_nsteps  = 500     # untraced (headline)
default_prof_nsteps = 100     # traced (rocprofv3 has overhead)
default_n_envs      = 8192
default_precision   = "32"
default_trials      = 3       # multi-trial untraced runs for sigma estimation

# Per-step JSON keys the harness probes when extracting throughput / wall.
metric_json_keys = ["throughput", "env_steps_per_sec"]
wall_json_keys   = ["wall_time_s", "wall"]

[bench.timeouts]
correctness_s = 600
untraced_s    = 600
traced_s      = 900

# ---------------------------------------------------------------------------
# Container
# ---------------------------------------------------------------------------
[container]
# How the launcher names per-GPU containers (gpu_id substituted).
name_template = "ak-gpu{gpu_id}"
# Default Docker image for the launcher. Any image with the project +
# Quadrants + Genesis installed will do.
image         = "genesis:amd-integration"
# Per-experiment outputs written under this path inside the container.
runs_dir      = "/work/runs"
# Cache wipe before every bench (stale compiled kernels silently no-op edits).
caches_to_wipe = [
    "/root/.cache/quadrants",
    "/root/.cache/mesa_shader_cache",
]
# Env vars set on every in-container command (Genesis quirks).
env = [
    "GS_FAST_MATH=0",
    "PYOPENGL_PLATFORM=egl",
    "EGL_PLATFORM=surfaceless",
    "PYGLET_HEADLESS=true",
]

# ---------------------------------------------------------------------------
# Profiler
# ---------------------------------------------------------------------------
[profiler]
# rocprofv3 invocation prefix. Replace for nsys / ncu / vTune.
command           = "rocprofv3 --stats --kernel-trace -f csv -d . -o traced --"
# Pattern for the per-kernel-stats CSV the profiler emits.
stats_csv_suffix  = "_kernel_stats.csv"
# Per-step kernels to drop from attribution (one-shot init etc).
exclude_kernel_re = "runtime_initialize_rand_states"

# ---------------------------------------------------------------------------
# Host
# ---------------------------------------------------------------------------
[host]
# What `prepare.py` checks for at setup time.
required_dirs = ["$HOME/work/Genesis", "$HOME/work/quadrants", "$HOME/work/newton-assets"]
# Default project source path (overridden by $GENESIS_SRC).
project_src   = "$HOME/work/Genesis"
# rocm-smi / rocminfo substring that identifies the expected GPU arch.
gpu_arch      = "gfx942"

# ---------------------------------------------------------------------------
# Correctness gate (scoped pytest)
# ---------------------------------------------------------------------------
[correctness]
pytest_dir       = "/src/Genesis"           # cwd inside container
pytest_extra_env = "GS_FAST_MATH=0"
pytest_args      = "-v -n 0 --forked -m required"

# ---------------------------------------------------------------------------
# GPU clock pinning (low-variance benches)
# ---------------------------------------------------------------------------
[gpu]
# {gpu_id} substituted; {prev} substituted on restore only.
read_perf_command    = "rocm-smi -d {gpu_id} --showperflevel"
pin_command          = "rocm-smi -d {gpu_id} --setperflevel high"
restore_command      = "rocm-smi -d {gpu_id} --setperflevel {prev}"
# Regex used to parse the `read_perf_command` output for the previous level.
prev_level_regex     = "Performance Level[^:]*:\\s*(\\w+)"
